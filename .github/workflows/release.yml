name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: ./build.sh

      - name: Verify build output
        run: |
          if [ ! -d "dist/Dage Auto.app" ]; then
            echo "Build failed: Dage Auto.app not found"
            ls -la dist/
            exit 1
          fi

      - name: Prepare release assets
        run: |
          [ -f "scripts/fix-quarantine.command" ] || { echo "Missing scripts/fix-quarantine.command"; exit 1; }
          cp scripts/fix-quarantine.command dist/
          chmod +x dist/fix-quarantine.command
          [ -f "steps/1st-step.png" ] && cp steps/1st-step.png steps/2nd-step.png steps/3rd-step.png dist/ || true

      - name: Zip app for release
        run: |
          cd dist
          zip -r "../Dage-Auto-macOS.zip" "Dage Auto.app" "fix-quarantine.command"
          [ -f "1st-step.png" ] && zip -u "../Dage-Auto-macOS.zip" "1st-step.png" "2nd-step.png" "3rd-step.png"
          cd ..
          unzip -l Dage-Auto-macOS.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dage-Auto-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: chmod +x build-ubuntu.sh && ./build-ubuntu.sh

      - name: Verify build output
        run: |
          if [ ! -f "dist/Dage Auto" ]; then
            echo "Build failed: dist/Dage Auto not found"
            ls -la dist/
            exit 1
          fi

      - name: Zip app for release
        run: |
          cd dist
          zip -r "../Dage-Auto-Ubuntu.zip" "Dage Auto"
          cd ..
          unzip -l Dage-Auto-Ubuntu.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dage-Auto-Ubuntu.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
