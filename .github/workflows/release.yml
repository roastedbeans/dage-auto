name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: ./build.sh

      - name: Verify build output
        run: |
          if [ ! -d "dist/Dage Auto.app" ]; then
            echo "Build failed: Dage Auto.app not found"
            ls -la dist/
            exit 1
          fi

      - name: Zip app for release
        run: |
          # Ensure fix-quarantine and step images exist
          [ -f "scripts/fix-quarantine.command" ] || { echo "Missing scripts/fix-quarantine.command"; exit 1; }
          [ -f "steps/1st-step.png" ] || { echo "Missing steps/1st-step.png"; exit 1; }
          [ -f "steps/2nd-step.png" ] || { echo "Missing steps/2nd-step.png"; exit 1; }
          [ -f "steps/3rd-step.png" ] || { echo "Missing steps/3rd-step.png"; exit 1; }
          cp scripts/fix-quarantine.command dist/
          cp steps/1st-step.png steps/2nd-step.png steps/3rd-step.png dist/
          chmod +x dist/fix-quarantine.command
          cd dist && zip -r "../Dage-Auto-macOS.zip" "Dage Auto.app" "fix-quarantine.command" "1st-step.png" "2nd-step.png" "3rd-step.png" && cd ..
          unzip -l ../Dage-Auto-macOS.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dage-Auto-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
