name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: ./build.sh

      - name: Verify build output
        run: |
          if [ ! -d "dist/Dage Auto.app" ]; then
            echo "Build failed: Dage Auto.app not found"
            ls -la dist/
            exit 1
          fi

      - name: Zip app for release
        run: |
          cp scripts/fix-quarantine.command dist/
          chmod +x dist/fix-quarantine.command
          cd dist && zip -r "../Dage-Auto-macOS.zip" "Dage Auto.app" "fix-quarantine.command" && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dage-Auto-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
